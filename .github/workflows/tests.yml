name: tests

on:
  push:
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lightweight test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy pandas torch PyYAML

      - name: Run unit tests
        run: python -m unittest discover -s tests

      - name: Check Optuna CLI help
        run: python scripts/tune_optuna.py --help
